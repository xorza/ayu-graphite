# Ayu Mirage High Contrast — semantic palette (single source of truth)
# Re-seeded by tools/import_from_zed.py from tools/ayu-source.json.
# Hand-edit me; the target builders are pure transformers.

[backgrounds]
bg = "#252525"
panel = "#2e2e2e"
surface = "#2e2e2e"
elem = "#2e2e2e"
elem_hover = "#343434"
elem_active = "#3b3b3b"
elem_selected = "#3b3b3b"
title_bar = "#353535"
title_bar_inactive = "#2e2e2e"
# Terminal.app and Zed terminal sit darker than the editor bg for extra contrast.
terminal_bg = "#101010"

[borders]
border = "#2b2b2b"
border_focused = "#105577"

[text]
text = "#e2dfd3"
text_muted = "#aaaaa8"
text_disabled = "#878a8d"

[accent_status]
accent = "#59d4ff"
success = "#daff58"
warning = "#ffd44a"
error = "#ff5e44"

[status_bg]
info_bg = "#2c4a60"
info_border = "#4a8ab0"
hint_bg = "#0f3e58"
hint_border = "#255d79"
success_bg = "#486a15"
success_border = "#668a2f"
warning_bg = "#5f4617"
warning_border = "#81632b"
error_bg = "#4f191a"
error_border = "#703130"

[diff]
created = "#daff58"
created_bg = "#486a15"
deleted = "#ff5e44"
deleted_bg = "#4f191a"

[ansi]
ansi_blue = "#4ad4ff"
ansi_magenta = "#1ee8ff"
ansi_cyan = "#69ffd2"

[syntax]
syn_keyword = "#ffa63d"
syn_function = "#ffd54c"
syn_string = "#d9ff57"
syn_string_regex = "#69ffd1"
syn_comment = "#617182"
syn_number = "#d897ff"
syn_type = "#4cd3ff"
syn_operator = "#ff8a3f"
syn_attribute = "#4ad4ff"
syn_punctuation = "#c7c6bf"
syn_doc = "#ababa9"
syn_string_special = "#ffdd8c"
syn_predictive = "#7091b3"
